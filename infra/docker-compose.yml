name: suerp

networks:
  suerp-net:
    name: suerp-net
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  grafana-data:

# ---------------------------------------------------------------------------
# Reusable anchors (DRY) shared by every Django microservice.
# ---------------------------------------------------------------------------

# Common environment for all 13 Django services. DATABASE_URL is overridden
# per service (each owns its logical DB via pgbouncer). JWT_SIGNING_KEY is the
# SAME value everywhere — zero-trust shared HS256 verification key.
x-django-env: &django-env
  SECRET_KEY: dev-insecure-secret-key
  DEBUG: "1"
  ALLOWED_HOSTS: "*"
  JWT_SIGNING_KEY: dev-insecure-shared-jwt-key
  # READ_DATABASE_URL is intentionally omitted: settings reads it with
  # default=DATABASE_URL, so leaving it unset makes read_db mirror the primary.
  # Passing it as an empty string would override that default and crash
  # dj_database_url.parse("").
  REDIS_URL: redis://redis:6379/0
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  GATEWAY_URL: http://gateway:8080

# Common service template for all Django containers (web/celery/consumer).
x-django-svc: &django-svc
  restart: unless-stopped
  networks:
    - suerp-net
  depends_on:
    postgres:
      condition: service_healthy
    pgbouncer:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: suerp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: suerp
      POSTGRES_PASSWORD: suerp
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    ports:
      - "5432:5432"
    networks:
      - suerp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suerp -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgbouncer:
    # No canonical official image for PgBouncer; edoburu/pgbouncer is the
    # widely used community build. No versioned tag is currently published,
    # so we pin to `latest` here.
    image: edoburu/pgbouncer:latest
    container_name: suerp-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    networks:
      - suerp-net
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=suerp psql -h 127.0.0.1 -p 6432 -U suerp -d auth -c 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    container_name: suerp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - suerp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: suerp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - suerp-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: suerp-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - suerp-net

  grafana:
    image: grafana/grafana:latest
    container_name: suerp-grafana
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards-json:ro
    ports:
      - "3000:3000"
    networks:
      - suerp-net
    depends_on:
      - prometheus

  gateway:
    # Nginx reverse proxy — the single public entry point. Routes /api/v1/*
    # to the owning backend service on the shared suerp-net network.
    build:
      context: ../gateway
      dockerfile: Dockerfile
    image: suerp/gateway
    container_name: suerp-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - suerp-net
    # No app depends_on: nginx resolves upstreams lazily via Docker DNS, so the
    # gateway starts regardless of which services are running (compose profiles).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # =========================================================================
  # Django microservices — web (gunicorn). Each migrates then serves on 8000.
  # Services with celery/consumer workers anchor their build + environment so
  # the worker containers reuse them verbatim.
  # =========================================================================

  auth-service:
    <<: *django-svc
    container_name: auth-service
    build: &auth-build
      context: ..
      dockerfile: services/auth-service/Dockerfile
    environment: &auth-env
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/auth
    command: &web-command sh -c "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 120 --graceful-timeout 30"

  finance-service:
    <<: *django-svc
    container_name: finance-service
    build: &finance-build
      context: ..
      dockerfile: services/finance-service/Dockerfile
    environment: &finance-env
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/finance
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RECEIPT_HMAC_SECRET: dev-insecure-receipt-secret
      FRONTEND_URL: http://localhost:3001
    command: *web-command

  grievance-service:
    <<: *django-svc
    container_name: grievance-service
    build: &grievance-build
      context: ..
      dockerfile: services/grievance-service/Dockerfile
    environment: &grievance-env
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/grievance
    command: *web-command

  hostel-service:
    <<: *django-svc
    container_name: hostel-service
    build: &hostel-build
      context: ..
      dockerfile: services/hostel-service/Dockerfile
    environment: &hostel-env
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/hostel
    command: *web-command

  notification-service:
    <<: *django-svc
    container_name: notification-service
    build: &notification-build
      context: ..
      dockerfile: services/notification-service/Dockerfile
    environment: &notification-env
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/notification
    command: *web-command

  transport-service:
    <<: *django-svc
    container_name: transport-service
    profiles: ["full"]
    build: &transport-build
      context: ..
      dockerfile: services/transport-service/Dockerfile
    environment: &transport-env
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/transport
    command: *web-command

  student-service:
    <<: *django-svc
    container_name: student-service
    profiles: ["full"]
    build:
      context: ..
      dockerfile: services/student-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/student
    command: *web-command

  attendance-service:
    <<: *django-svc
    container_name: attendance-service
    profiles: ["full"]
    build:
      context: ..
      dockerfile: services/attendance-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/attendance
    command: *web-command

  exam-service:
    <<: *django-svc
    container_name: exam-service
    profiles: ["full"]
    build:
      context: ..
      dockerfile: services/exam-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/exam
    command: *web-command

  library-service:
    <<: *django-svc
    container_name: library-service
    profiles: ["full"]
    build:
      context: ..
      dockerfile: services/library-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/library
    command: *web-command

  canteen-service:
    <<: *django-svc
    container_name: canteen-service
    profiles: ["full"]
    build:
      context: ..
      dockerfile: services/canteen-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/canteen
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    command: *web-command

  placement-service:
    <<: *django-svc
    container_name: placement-service
    profiles: ["full"]
    build:
      context: ..
      dockerfile: services/placement-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/placement
    command: *web-command

  analytics-service:
    <<: *django-svc
    container_name: analytics-service
    profiles: ["full"]
    build:
      context: ..
      dockerfile: services/analytics-service/Dockerfile
    environment:
      <<: *django-env
      DATABASE_URL: postgres://suerp:suerp@pgbouncer:6432/analytics
    command: *web-command

  # =========================================================================
  # Celery workers (combined worker + beat) — drain the transactional outbox.
  # =========================================================================

  auth-celery:
    <<: *django-svc
    container_name: auth-celery
    build: *auth-build
    environment: *auth-env
    # -Q pins this worker to its own queue — every service shares one Redis
    # broker, so without per-service queues a worker can pop and silently
    # discard another service's task ("Received unregistered task").
    command: celery -A config worker -B -l info --concurrency=1 -Q auth

  finance-celery:
    <<: *django-svc
    container_name: finance-celery
    build: *finance-build
    environment: *finance-env
    command: celery -A config worker -B -l info --concurrency=1 -Q finance

  grievance-celery:
    <<: *django-svc
    container_name: grievance-celery
    build: *grievance-build
    environment: *grievance-env
    command: celery -A config worker -B -l info --concurrency=1 -Q grievance

  hostel-celery:
    <<: *django-svc
    container_name: hostel-celery
    build: *hostel-build
    environment: *hostel-env
    command: celery -A config worker -B -l info --concurrency=1 -Q hostel

  notification-celery:
    <<: *django-svc
    container_name: notification-celery
    build: *notification-build
    environment: *notification-env
    command: celery -A config worker -B -l info --concurrency=1 -Q notification

  transport-celery:
    <<: *django-svc
    container_name: transport-celery
    profiles: ["full"]
    build: *transport-build
    environment: *transport-env
    command: celery -A config worker -B -l info --concurrency=1 -Q transport

  # =========================================================================
  # Event consumers (manage.py consume_events) — process inbound domain events.
  # =========================================================================

  finance-consumer:
    <<: *django-svc
    container_name: finance-consumer
    build: *finance-build
    environment: *finance-env
    command: python manage.py consume_events

  grievance-consumer:
    <<: *django-svc
    container_name: grievance-consumer
    build: *grievance-build
    environment: *grievance-env
    command: python manage.py consume_events

  hostel-consumer:
    <<: *django-svc
    container_name: hostel-consumer
    build: *hostel-build
    environment: *hostel-env
    command: python manage.py consume_events

  notification-consumer:
    <<: *django-svc
    container_name: notification-consumer
    build: *notification-build
    environment: *notification-env
    command: python manage.py consume_events

  transport-consumer:
    <<: *django-svc
    container_name: transport-consumer
    profiles: ["full"]
    build: *transport-build
    environment: *transport-env
    command: python manage.py consume_events

  # =========================================================================
  # ai-service (FastAPI). NOTE: gateway routes AI traffic to :8001, so the
  # Dockerfile's default :8000 CMD is overridden here.
  # =========================================================================

  ai-service:
    container_name: ai-service
    restart: unless-stopped
    build: &ai-build
      context: ../services/ai-service
      dockerfile: Dockerfile
    environment: &ai-env
      JWT_SIGNING_KEY: dev-insecure-shared-jwt-key
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      GATEWAY_URL: http://gateway:8080
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    networks:
      - suerp-net
    depends_on:
      rabbitmq:
        condition: service_healthy

  ai-consumer:
    container_name: ai-consumer
    restart: unless-stopped
    build: *ai-build
    environment: *ai-env
    command: python -m app.consumer
    networks:
      - suerp-net
    depends_on:
      rabbitmq:
        condition: service_healthy

  # =========================================================================
  # Frontend (Next.js). Browser reaches the gateway on the host at :8080.
  # =========================================================================

  frontend:
    container_name: suerp-frontend
    restart: unless-stopped
    build:
      context: ../frontend/su-erp-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080
    ports:
      - "3001:3000"
    networks:
      - suerp-net
    depends_on:
      - gateway
