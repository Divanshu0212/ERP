name: suerp

networks:
  suerp-net:
    name: suerp-net
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  grafana-data:

services:
  postgres:
    image: postgres:16
    container_name: suerp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: suerp
      POSTGRES_PASSWORD: suerp
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    ports:
      - "5432:5432"
    networks:
      - suerp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suerp -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgbouncer:
    # No canonical official image for PgBouncer; edoburu/pgbouncer is the
    # widely used community build. No versioned tag is currently published,
    # so we pin to `latest` here.
    image: edoburu/pgbouncer:latest
    container_name: suerp-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    networks:
      - suerp-net
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=suerp psql -h 127.0.0.1 -p 6432 -U suerp -d auth -c 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    container_name: suerp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - suerp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: suerp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - suerp-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: suerp-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - suerp-net

  grafana:
    image: grafana/grafana:latest
    container_name: suerp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - suerp-net
    depends_on:
      - prometheus
