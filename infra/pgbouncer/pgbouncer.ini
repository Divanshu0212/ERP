[databases]
auth = host=postgres port=5432 dbname=auth
hostel = host=postgres port=5432 dbname=hostel
finance = host=postgres port=5432 dbname=finance
transport = host=postgres port=5432 dbname=transport
grievance = host=postgres port=5432 dbname=grievance
notification = host=postgres port=5432 dbname=notification
student = host=postgres port=5432 dbname=student
attendance = host=postgres port=5432 dbname=attendance
exam = host=postgres port=5432 dbname=exam
library = host=postgres port=5432 dbname=library
canteen = host=postgres port=5432 dbname=canteen
placement = host=postgres port=5432 dbname=placement
analytics = host=postgres port=5432 dbname=analytics

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Auth: local userlist file (dev-only plaintext creds; matches POSTGRES_USER/PASSWORD).
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

; Required for thousands-of-connections scale goal: multiplex client
; connections onto a small Postgres backend pool, releasing the backend
; connection back to the pool at the end of each transaction.
pool_mode = transaction

max_client_conn = 2000
default_pool_size = 20
min_pool_size = 0
reserve_pool_size = 5
reserve_pool_timeout = 3

; Needed so clients can run `\l`, healthchecks, etc. against pgbouncer itself.
admin_users = suerp
stats_users = suerp

logfile = /tmp/pgbouncer.log
pidfile = /tmp/pgbouncer.pid

ignore_startup_parameters = extra_float_digits
