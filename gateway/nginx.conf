# SU-ERP API gateway — single entry point in front of all backend services.
# Listens on 0.0.0.0:8080 and reverse-proxies /api/v1/* to the owning service.
#
# Responsibilities:
#   - path-based routing to each microservice upstream
#   - per-IP rate limiting (global zone + stricter zone for /auth/login)
#   - preserve the Authorization bearer token unchanged to the upstream
#   - stamp every request with an X-Request-Id (UUID) for tracing
#   - gzip response compression
#   - a cheap /health liveness endpoint
#
# Upstreams are resolved LAZILY via Docker's embedded DNS (127.0.0.11) using
# per-location variables in proxy_pass. This decouples gateway startup from
# service availability: nginx starts even when some services are not running
# (e.g. profile-gated services), and a request to an absent upstream simply
# returns 502 instead of the whole gateway failing to boot. Static `upstream {}`
# blocks would force DNS resolution of every name at startup and crash nginx if
# any were missing — which is exactly what we want to avoid with compose profiles.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker embedded DNS. valid=10s re-resolves so container restarts (new IPs)
    # are picked up without reloading nginx.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # ---- logging ----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rid=$request_id';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    server_tokens off;

    keepalive_timeout 65;

    # ---- gzip compression -------------------------------------------------
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types        application/json application/javascript application/xml
                      text/plain text/css text/xml text/javascript;

    # ---- CORS -------------------------------------------------------------
    # The browser SPA (http://localhost:3001) is a different origin from the
    # gateway (http://localhost:8080), so every /api/v1/* call is cross-origin
    # and JSON POSTs trigger a preflight OPTIONS. We reflect any localhost /
    # 127.0.0.1 origin (dev). $cors_origin is empty for disallowed origins, in
    # which case no ACAO header is emitted and the browser blocks the response.
    map $http_origin $cors_origin {
        default                                 "";
        "~^http://localhost(:[0-9]+)?$"         $http_origin;
        "~^http://127\.0\.0\.1(:[0-9]+)?$"      $http_origin;
    }

    # ---- rate limiting ----------------------------------------------------
    # Global: 10 req/s per client IP.  Per-location bursts add headroom.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Stricter zone reserved for the login endpoint: 3 req/s per client IP.
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;
    # Return 429 (Too Many Requests) rather than the nginx default 503.
    limit_req_status 429;

    server {
        listen      0.0.0.0:8080;
        server_name _;

        # Cap request body size to a sane default for an API gateway.
        client_max_body_size 20m;

        # Headers forwarded to every upstream. The Authorization header reaches
        # the upstream unchanged; X-Request-Id is a fresh UUID per request.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-Request-Id      $request_id;

        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # ---- CORS -------------------------------------------------------------
        # Emitted on every response (always, so error responses carry them too).
        # We don't use cookies (the SPA sends the JWT in the Authorization
        # header), so Allow-Credentials is not needed and a reflected origin is
        # safe. Locations below add no headers of their own, so these inherit.
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-Id" always;
        add_header Access-Control-Max-Age       86400 always;

        # Answer the preflight OPTIONS at the gateway (before proxying) so the
        # browser gets the CORS headers even though upstreams don't emit them.
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ---- gateway health check -----------------------------------------
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status": "ok"}';
        }

        # ---- auth: stricter rate limit on the login endpoint --------------
        # Exact-match wins over the /api/v1/auth/ prefix below.
        location = /api/v1/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            set $up auth-service:8000;
            proxy_pass http://$up;
        }

        location /api/v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up auth-service:8000;
            proxy_pass http://$up;
        }

        location /api/v1/finance/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up finance-service:8000;
            proxy_pass http://$up;
        }

        location /api/v1/hostel/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up hostel-service:8000;
            proxy_pass http://$up;
        }

        location /api/v1/transport/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up transport-service:8000;
            proxy_pass http://$up;
        }

        # Grievance service exposes /api/v1/grievance with no trailing slash;
        # the exact-match handles that bare path, the prefix handles sub-paths.
        location = /api/v1/grievance {
            limit_req zone=api_limit burst=20 nodelay;
            set $up grievance-service:8000;
            proxy_pass http://$up;
        }

        location /api/v1/grievance/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up grievance-service:8000;
            proxy_pass http://$up;
        }

        location /api/v1/notify/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up notification-service:8000;
            proxy_pass http://$up;
        }

        # AI-service (FastAPI) exposes bare /ai/... on port 8001 with no /api/v1
        # prefix, so strip /api/v1/ai and forward only /ai/... upstream.
        location /api/v1/ai/ {
            limit_req zone=api_limit burst=20 nodelay;
            # set MUST precede the rewrite: `break` halts the rewrite phase, so
            # a `set` after it would never run (uninitialized $up -> 500).
            set $up ai-service:8001;
            rewrite ^/api/v1/ai/(.*)$ /ai/$1 break;
            proxy_pass http://$up;
        }

        location /api/v1/students/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up student-service:8000;
            proxy_pass http://$up;
        }

        location /api/v1/attendance/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up attendance-service:8000;
            proxy_pass http://$up;
        }

        location /api/v1/exams/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up exam-service:8000;
            proxy_pass http://$up;
        }

        location /api/v1/books/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up library-service:8000;
            proxy_pass http://$up;
        }

        location /api/v1/menu-items/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up canteen-service:8000;
            proxy_pass http://$up;
        }

        # Placement service serves /api/v1/drives/, so rewrite the public
        # /api/v1/placements/ prefix to /api/v1/drives/ on the upstream.
        location /api/v1/placements/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up placement-service:8000;
            rewrite ^/api/v1/placements/(.*)$ /api/v1/drives/$1 break;
            proxy_pass http://$up;
        }

        location /api/v1/metrics/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $up analytics-service:8000;
            proxy_pass http://$up;
        }

        # Unknown routes: a JSON 404 in the shared response envelope shape.
        location / {
            default_type application/json;
            return 404 '{"success": false, "data": null, "message": "Not found", "errors": ["route not found"]}';
        }
    }
}
