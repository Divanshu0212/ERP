# SU-ERP API gateway — single entry point in front of all backend services.
# Listens on 0.0.0.0:8080 and reverse-proxies /api/v1/* to the owning service.
#
# Responsibilities:
#   - path-based routing to each microservice upstream
#   - per-IP rate limiting (global zone + stricter zone for /auth/login)
#   - preserve the Authorization bearer token unchanged to the upstream
#   - stamp every request with an X-Request-Id (UUID) for tracing
#   - gzip response compression
#   - a cheap /health liveness endpoint

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- logging ----------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rid=$request_id';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    server_tokens off;

    keepalive_timeout 65;

    # ---- gzip compression -------------------------------------------------
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types        application/json application/javascript application/xml
                      text/plain text/css text/xml text/javascript;

    # ---- rate limiting ----------------------------------------------------
    # Global: 10 req/s per client IP.  Per-location bursts add headroom.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Stricter zone reserved for the login endpoint: 3 req/s per client IP.
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;
    # Return 429 (Too Many Requests) rather than the nginx default 503.
    limit_req_status 429;

    # ---- upstreams --------------------------------------------------------
    upstream auth_upstream         { server auth-service:8000; }
    upstream finance_upstream      { server finance-service:8000; }
    upstream hostel_upstream       { server hostel-service:8000; }
    upstream transport_upstream    { server transport-service:8000; }
    upstream grievance_upstream    { server grievance-service:8000; }
    upstream notification_upstream { server notification-service:8000; }
    upstream ai_upstream           { server ai-service:8001; }
    upstream student_upstream      { server student-service:8000; }
    upstream attendance_upstream   { server attendance-service:8000; }
    upstream exam_upstream         { server exam-service:8000; }
    upstream library_upstream      { server library-service:8000; }
    upstream canteen_upstream      { server canteen-service:8000; }
    upstream placement_upstream    { server placement-service:8000; }
    upstream analytics_upstream    { server analytics-service:8000; }

    server {
        listen      0.0.0.0:8080;
        server_name _;

        # Cap request body size to a sane default for an API gateway.
        client_max_body_size 20m;

        # Headers forwarded to every upstream. The Authorization header is
        # part of the standard proxied request set, so the incoming bearer
        # token reaches the upstream unchanged; we set it explicitly to be
        # unambiguous. X-Request-Id is a fresh UUID per request.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-Request-Id      $request_id;

        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # ---- gateway health check -----------------------------------------
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status": "ok"}';
        }

        # ---- auth: stricter rate limit on the login endpoint --------------
        # More specific location wins, so /auth/login is matched before the
        # broader /api/v1/auth/ prefix below.
        location = /api/v1/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://auth_upstream;
        }

        location /api/v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_upstream;
        }

        location /api/v1/finance/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://finance_upstream;
        }

        location /api/v1/hostel/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://hostel_upstream;
        }

        location /api/v1/transport/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://transport_upstream;
        }

        location /api/v1/grievance/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://grievance_upstream;
        }

        location /api/v1/notify/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://notification_upstream;
        }

        location /api/v1/ai/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://ai_upstream;
        }

        location /api/v1/students/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://student_upstream;
        }

        location /api/v1/attendance/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://attendance_upstream;
        }

        location /api/v1/exams/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://exam_upstream;
        }

        location /api/v1/books/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://library_upstream;
        }

        location /api/v1/menu-items/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://canteen_upstream;
        }

        location /api/v1/placements/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://placement_upstream;
        }

        location /api/v1/metrics/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://analytics_upstream;
        }

        # Unknown routes: a JSON 404 in the shared response envelope shape.
        location / {
            default_type application/json;
            return 404 '{"success": false, "data": null, "message": "Not found", "errors": ["route not found"]}';
        }
    }
}
