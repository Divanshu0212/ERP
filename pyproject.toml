[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]  # black handles line length

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.pytest.ini_options]
python_files = ["test_*.py", "tests.py"]
addopts = "-q"
# Per-service settings modules are configured in each service's own pytest.ini /
# conftest.py, not here — this is a monorepo of independent Django projects.
