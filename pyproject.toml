[tool.ruff]
line-length = 100
target-version = "py312"
# Import sorting is owned by isort (see [tool.isort]); Django-generated
# migrations are machine-written, so we don't lint them.
extend-exclude = ["**/migrations/*.py"]

[tool.ruff.lint]
select = ["E", "F", "UP", "B"]
ignore = ["E501"]  # black handles line length

[tool.black]
line-length = 100
target-version = ["py312"]
force-exclude = "/migrations/"

[tool.isort]
profile = "black"
line_length = 100
extend_skip_glob = ["*/migrations/*"]

[tool.pytest.ini_options]
python_files = ["test_*.py", "tests.py"]
addopts = "-q"
# Per-service settings modules are configured in each service's own pytest.ini /
# conftest.py, not here — this is a monorepo of independent Django projects.
